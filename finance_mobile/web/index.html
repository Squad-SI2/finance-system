  <!-- ✅ Firebase y FCM con registro manual de SW -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCZPmAnJnsPqzlhi86ZxJvM-vpaNQ7IY4c",
      authDomain: "finance-system-29d3d.firebaseapp.com",
      projectId: "finance-system-29d3d",
      storageBucket: "finance-system-29d3d.firebasestorage.app",
      messagingSenderId: "788345017826",
      appId: "1:788345017826:web:6e00ae6fdc2238488cd5bb",
      measurementId: "G-XEK7JX11GH"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const messaging = getMessaging(app);

    const base = document.querySelector('base')?.getAttribute('href') || '/';
    const baseUrl = base.endsWith('/') ? base : base + '/';
    const swPath = baseUrl + 'firebase-messaging-sw.js';

    console.log('Service Worker path:', swPath);

    navigator.serviceWorker.register(swPath)
      .then(registration => getToken(messaging, {
        vapidKey: 'BLyCPhPXXBLVzUkTyMDb2nxuhQuo8Wyj3TEvlrL6A9QONY5qqFhc4vmAGO3LS6tbNW9YDD_T_Ue28sw10G09000',
        serviceWorkerRegistration: registration
      }))
      .then(currentToken => {
        if (currentToken) {
          console.log('✅ FCM Token web:', currentToken);
          window.parent.postMessage({ type: 'fcmToken', token: currentToken }, '*');
        } else {
          console.log('⚠️ No se pudo obtener token FCM');
        }
      })
      .catch(err => console.log('❌ Error obteniendo token FCM:', err));

    onMessage(messaging, (payload) => {
      console.log('🔔 Notificación en primer plano:', payload);
      if (window.showNotification) {
        window.showNotification(
          payload.notification.title,
          payload.notification.body,
          payload.data?.actionUrl
        );
      }
    });
  </script>
