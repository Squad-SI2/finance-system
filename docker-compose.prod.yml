services:
  serv-finance-db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: []
    volumes:
      - finance_db_data:/var/lib/postgresql/data
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: finance_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - finance-net

  serv-finance-api:
    build:
      context: ./finance-api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      serv-finance-db:
        condition: service_healthy
    env_file:
      - .env
    ports: []
    networks:
      - finance-net

  serv-finance-web:
    build:
      context: ./finance-web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - serv-finance-api
    ports: []
    networks:
      - finance-net

  serv-nginx:
    image: nginx:stable-alpine
    container_name: finance_nginx
    restart: unless-stopped
    depends_on:
      - serv-finance-web
      - serv-finance-api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - finance-net

volumes:
  finance_db_data:

networks:
  finance-net:
    name: finance-system_finance-net
    driver: bridge