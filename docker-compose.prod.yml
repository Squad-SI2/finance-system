services:
  serv-finance-db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/data
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: finance_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - finance-net

  serv-finance-api:
    image: sebastiandevjs/finance-api:1.0.0
    restart: unless-stopped
    depends_on:
      serv-finance-db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - backup_data:/storage/backups
    ports: []
    networks:
      - finance-net

  serv-finance-web:
    image: sebastiandevjs/finance-web:1.0.0
    restart: unless-stopped
    depends_on:
      - serv-finance-api
    ports: []
    networks:
      - finance-net

  serv-finance-flutter-web:
    image: sebastiandevjs/finance-flutter-web:1.0.0
    restart: unless-stopped
    networks:
      - finance-net

  serv-nginx:
    image: nginx:stable-alpine
    container_name: finance_nginx
    restart: unless-stopped
    depends_on:
      - serv-finance-web
      - serv-finance-api
      - serv-finance-flutter-web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
    networks:
      - finance-net

volumes:
  finance_db_data:
  backup_data:

networks:
  finance-net:
    name: finance-system_finance-net
    driver: bridge
