<header
  class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur"
>
  <div class="flex h-16 items-center justify-between px-4 sm:px-6">
    <div class="flex items-center gap-4">
      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-300 text-slate-700 transition hover:bg-slate-50 lg:hidden"
        aria-label="Abrir menú"
        (click)="onOpenMobileMenu()"
      >
        ☰
      </button>

      @if (currentPageInfo$ | async; as pageInfo) {
        <div>
          <p class="text-sm text-slate-500">{{ pageInfo.subtitle }}</p>
          <h1 class="text-base font-semibold text-slate-900">
            {{ pageInfo.title }}
          </h1>
        </div>
      }
    </div>

    <div class="flex items-center gap-3">
      <button
        type="button"
        class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
        (click)="onSearchClick()"
      >
        Buscar
      </button>

      <button
        type="button"
        class="flex items-center gap-3 rounded-2xl border border-slate-200 px-3 py-2 transition hover:bg-slate-50"
        (click)="onProfileClick()"
      >
        <div
          class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-900 text-sm font-semibold text-white"
        >
          W
        </div>

        <div class="hidden text-left sm:block">
          <p class="text-sm font-medium text-slate-900">Walter</p>
          <p class="text-xs text-slate-500">Administrador</p>
        </div>
      </button>
    </div>
  </div>
</header>
