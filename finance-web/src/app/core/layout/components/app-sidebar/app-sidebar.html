<aside
  class="hidden h-screen w-72 shrink-0 border-r border-slate-200 bg-white lg:flex lg:flex-col"
>
  <a
    routerLink="/dashboard"
    class="flex h-16 items-center gap-3 border-b border-slate-200 px-6 transition hover:bg-slate-50"
  >
    <div
      class="flex h-10 w-10 items-center justify-center rounded-2xl bg-slate-900 text-sm font-semibold text-white"
    >
      A
    </div>

    <div>
      <p class="text-sm font-semibold text-slate-900">MyApp</p>
      <p class="text-xs text-slate-500">Workspace</p>
    </div>
  </a>

  <div class="flex-1 overflow-y-auto p-4">
    <nav class="space-y-1">
      @for (item of navigationItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-slate-100 text-slate-900"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </div>
</aside>
