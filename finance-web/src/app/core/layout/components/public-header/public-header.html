<header
  class="sticky top-0 z-50 w-full border-b border-[#cccccc] bg-[#ffffff]/80 backdrop-blur-xl"
>
  <div
    class="mx-auto flex h-16 w-full max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8"
  >
    <div class="flex items-center gap-8">
      <button
        type="button"
        class="group inline-flex items-center gap-3"
        (click)="onLogoClick()"
      >
        <div
          class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[#333333] text-xs font-semibold tracking-wide text-[#ffffff] shadow-sm transition group-hover:scale-[1.02]"
        >
          FN
        </div>

        <div class="flex flex-col items-start leading-none">
          <span class="text-sm font-semibold tracking-tight text-[#333333]">
            Finance
          </span>
          <span class="text-xs text-[#666666]">Sistema Financiero</span>
        </div>
      </button>

      <nav class="hidden items-center gap-1 lg:flex">
        @for (item of navigationItems; track item.label) {
          <button
            type="button"
            class="inline-flex h-10 items-center rounded-xl px-4 text-sm font-medium text-[#666666] transition hover:bg-[#f5f5f5] hover:text-[#333333]"
            (click)="onNavigationItemClick(item)"
          >
            {{ item.label }}
          </button>
        }
      </nav>
    </div>

    <div class="flex items-center gap-2">
      <button
        type="button"
        class="hidden sm:inline-flex h-10 items-center rounded-xl px-4 text-sm font-medium text-[#666666] transition hover:bg-[#f5f5f5] hover:text-[#333333]"
        (click)="onLoginClick()"
      >
        Iniciar sesión
      </button>
      <button
        type="button"
        (click)="onSignupClick()"
        class="hidden sm:inline-flex h-10 items-center rounded-xl px-4 text-sm font-medium text-[#ffffff] bg-[#333333] hover:bg-[#666666] transition"
      >
        Registrarse
      </button>

      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl text-[#666666] hover:bg-[#f5f5f5] lg:hidden"
        aria-label="Abrir menú"
      >
        ☰
      </button>
    </div>
  </div>
</header>
