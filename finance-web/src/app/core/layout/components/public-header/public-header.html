<header
  class="sticky top-0 z-50 w-full border-b border-slate-200/80 bg-white/80 backdrop-blur-xl"
>
  <div
    class="mx-auto flex h-16 w-full max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8"
  >
    <div class="flex items-center gap-8">
      <button
        type="button"
        class="group inline-flex items-center gap-3"
        (click)="onLogoClick()"
      >
        <div
          class="flex h-10 w-10 items-center justify-center rounded-2xl bg-slate-900 text-xs font-semibold tracking-wide text-white shadow-sm transition group-hover:scale-[1.02]"
        >
          TH
        </div>

        <div class="flex flex-col items-start leading-none">
          <span class="text-sm font-semibold tracking-tight text-slate-900">
            MyApp
          </span>
          <span class="text-xs text-slate-500"> Business platform </span>
        </div>
      </button>

      <nav class="hidden items-center gap-1 lg:flex">
        @for (item of navigationItems; track item.label) {
          <button
            type="button"
            class="inline-flex h-10 items-center rounded-xl px-4 text-sm font-medium text-slate-600 transition hover:bg-slate-100 hover:text-slate-900"
            (click)="onNavigationItemClick(item)"
          >
            {{ item.label }}
          </button>
        }
      </nav>
    </div>

    <div class="flex items-center gap-2">
      <button
        hlmBtn
        type="button"
        variant="ghost"
        class="hidden sm:inline-flex"
        (click)="onLoginClick()"
      >
        Iniciar sesión
      </button>

      <button
        hlmBtn
        type="button"
        class="hidden sm:inline-flex"
        (click)="onGetStartedClick()"
      >
        Empezar
      </button>

      <button
        hlmBtn
        type="button"
        variant="ghost"
        size="icon"
        class="inline-flex lg:hidden"
        aria-label="Abrir menú"
      >
        ☰
      </button>
    </div>
  </div>
</header>
