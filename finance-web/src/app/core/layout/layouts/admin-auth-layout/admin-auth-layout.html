<div
  class="bg-background flex min-h-svh flex-col items-center justify-center gap-6 p-6 md:p-10"
>
  <div class="w-full max-w-sm">
    <router-outlet />
  </div>
  <div class="flex flex-col gap-4 p-4">
    <div class="flex items-center gap-3">
      <label for="colorPicker" class="text-sm font-medium">
        Selecciona un color:
      </label>

      <input
        id="colorPicker"
        type="color"
        (input)="onColorChange($event)"
        class="h-10 w-16 cursor-pointer"
        [value]="selectedColor"
      />
    </div>

    <p class="text-sm">
      Color seleccionado:
      <span class="font-bold">{{ selectedColor }}</span>
    </p>
  </div>
  <select class="rounded border p-2" (change)="onFontChange($event)">
    <option value="Inter">Inter</option>
    <option value="Roboto">Roboto</option>
    <option value="Poppins">Poppins</option>
    <option value="DM Sans">DM Sans</option>
    <option value="Montserrat">Montserrat</option>
    <option value="IBM Plex Sans">IBM Plex Sans</option>
    <option value='"Press Start 2P", cursive'>Pixel (Retro)</option>
  </select>
</div>
