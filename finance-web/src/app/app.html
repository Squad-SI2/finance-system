@if (sessionStore.isBootstrapping() || !sessionStore.initialized()) {
  <main class="flex min-h-screen items-center justify-center bg-white">
    <div class="flex flex-col items-center gap-4 text-center">
      <div class="relative h-12 w-12">
        <div
          class="absolute inset-0 animate-spin rounded-full border-[3px] border-[#C8E6C9] border-t-[#2E7D32]"
        ></div>
      </div>
      <div>
        <h1 class="text-base font-semibold tracking-tight text-[#2E7D32]">
          Cargando sesión
        </h1>
        <p class="mt-1 text-sm text-[#666666]">
          Por favor espera mientras restauramos tu sesión.
        </p>
      </div>
    </div>
  </main>
} @else {
  <router-outlet />
}
