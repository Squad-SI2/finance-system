<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <hlm-field-group>
    <div class="flex flex-col items-center gap-1 text-center">
      <h1 class="text-2xl font-bold">
        <span>¿Olvidaste</span><br />
        <span>tu contraseña?</span>
      </h1>
      <p class="text-muted-foreground text-sm text-balance">
        <span>Ingresa tu correo electrónico</span><br />
        <span>y restablece tu contraseña.</span>
      </p>
    </div>

    @if (errorMessage()) {
      <div
        class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600"
      >
        {{ errorMessage() }}
      </div>
    }

    <app-email-input
      [control]="form.controls.email"
      inputId="email"
      label="Correo electrónico"
      placeholder="thunder@ejemplo.com"
      description="Si la cuenta existe, te enviaremos un enlace para restablecer tu
        contraseña"
    />

    <hlm-field>
      <button hlmBtn type="submit" [disabled]="form.invalid || isSubmitting()">
        @if (isSubmitting()) {
          Enviando...
        } @else {
          Enviar enlace
        }
      </button>
    </hlm-field>

    <hlm-field>
      <p hlmFieldDescription class="text-center">
        ¿Recuerdas tu contraseña?
        <a routerLink="/auth/login">Inicia sesión</a>
      </p>
    </hlm-field>
  </hlm-field-group>
</form>
