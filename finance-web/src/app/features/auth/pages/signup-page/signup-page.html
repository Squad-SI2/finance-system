<section class="mx-auto flex min-h-screen w-full max-w-md items-center px-6 py-12 bg-[#F1F8E9]">
  <div class="w-full">
    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="mb-2 text-3xl font-bold text-[#2E7D32]">Crear Cuenta</h1>
      <p class="text-[#666666]">
        Crea tu tenant y empieza a gestionar tus finanzas hoy
      </p>
    </div>

    <!-- Signup Form Component -->
    <app-signup-form class="w-full" [isSubmitting]="isSubmitting()" [errorMessage]="errorMessage()"
      (submitSignup)="onSubmit($event)" (formEdited)="onFormEdited()" />
  </div>
</section>
