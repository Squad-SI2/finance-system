<form class="space-y-5">
  <div>
    <label for="email" class="mb-2 block text-sm font-medium text-slate-700">
      Correo electrónico
    </label>
    <input
      id="email"
      type="email"
      placeholder="tu@email.com"
      class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm transition outline-none focus:border-slate-400" />
  </div>

  <div>
    <label for="password" class="mb-2 block text-sm font-medium text-slate-700">
      Contraseña
    </label>
    <input
      id="password"
      type="password"
      placeholder="••••••••"
      class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm transition outline-none focus:border-slate-400" />
  </div>

  <button
    type="submit"
    class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white transition hover:opacity-90">
    Ingresar
  </button>

  <p class="text-center text-sm text-slate-500">¿Olvidaste tu contraseña?</p>
</form>
