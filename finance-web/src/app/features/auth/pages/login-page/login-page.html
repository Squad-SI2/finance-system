<div class="space-y-4">
  @if (errorMessage()) {
    <div class="rounded-lg bg-[#f5f5f5] p-4 text-sm text-[#333333] border border-[#999999]">
      {{ errorMessage() }}
    </div>
  }

  <form (ngSubmit)="onSubmit()" class="space-y-5">
    <!-- Campo Tenant Slug -->
    <div>
      <label for="tenantSlug" class="mb-2 block text-sm font-medium text-[#333333]">
        Tenant / Empresa
      </label>
      <input
        id="tenantSlug"
        type="text"
        placeholder="ej: financruz"
        [value]="tenantSlug()"
        (input)="onTenantSlugChange($event.target.value)"
        class="w-full rounded-2xl border border-[#999999] bg-[#ffffff] px-4 py-3 text-sm text-[#333333] transition outline-none focus:border-[#333333] placeholder:text-[#999999]" />
      <p class="mt-1 text-xs text-[#666666]">
        Ingresa el slug del tenant para acceder
      </p>
    </div>

    <!-- Campo Email -->
    <div>
      <label for="email" class="mb-2 block text-sm font-medium text-[#333333]">
        Correo electrónico
      </label>
      <input
        id="email"
        type="email"
        placeholder="tu&#64;email.com"
        [value]="email()"
        (input)="onEmailChange($event.target.value)"
        class="w-full rounded-2xl border border-[#999999] bg-[#ffffff] px-4 py-3 text-sm text-[#333333] transition outline-none focus:border-[#333333] placeholder:text-[#999999]" />
    </div>

    <!-- Campo Password -->
    <div>
      <label for="password" class="mb-2 block text-sm font-medium text-[#333333]">
        Contraseña
      </label>
      <input
        id="password"
        type="password"
        placeholder="••••••••"
        [value]="password()"
        (input)="onPasswordChange($event.target.value)"
        class="w-full rounded-2xl border border-[#999999] bg-[#ffffff] px-4 py-3 text-sm text-[#333333] transition outline-none focus:border-[#333333] placeholder:text-[#999999]" />
    </div>

    <!-- Botón Submit -->
    <button
      type="submit"
      [disabled]="isLoading()"
      class="w-full rounded-2xl bg-[#333333] px-4 py-3 text-sm font-medium text-[#ffffff] transition hover:bg-[#666666] disabled:opacity-50 disabled:cursor-not-allowed">
      {{ isLoading() ? 'Ingresando...' : 'Ingresar' }}
    </button>

    <p class="text-center text-sm text-[#666666]">¿Olvidaste tu contraseña?</p>
  </form>
</div>
