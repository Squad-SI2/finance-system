<section class="space-y-6">
  <section hlmCard>
    <app-card-header
      title="Tenants"
      description="Gestiona los tenants registrados en el sistema"
      icon="lucideUsers"
      [showAction]="!store.isEmpty()"
      actionLabel="Nuevo"
      actionIcon="lucidePlus"
      (actionClick)="onCreateTenant()"
    />

    <div hlmCardContent>
      @if (store.loading()) {
        <div class="space-y-4">
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
        </div>
      } @else if (store.hasError()) {
        <app-table-error
          variant="destructive"
          icon="lucideAlertCircle"
          [description]="
            store.error()?.message || 'Ocurrio un error inesperado'
          "
          title="No se pudieron cargar los tenants"
          [showAction]="true"
          actionLabel="Reintentar"
          (actionClick)="onRetry()"
        />
      } @else if (store.isEmpty()) {
        <app-empty-state
          title="Sin tenants"
          description="Aún no existen tenants para mostrar."
          icon="lucideInbox"
          [showAction]="true"
          actionLabel="Crear primer tenant"
          actionIcon="lucidePlus"
          (actionClick)="onCreateTenant()"
        />
      } @else {
        <app-tenant-table
          [tenants]="store.tenants()"
          [togglingTenantIds]="store.togglingTenantIds()"
          (viewTenant)="onViewTenant($event)"
          (editTenant)="onEditTenant($event)"
          (activateTenant)="onActivateTenant($event)"
          (deactivateTenant)="onDeactivateTenant($event)"
        />
        <app-tenant-detail-dialog
          [open]="viewDialogOpen()"
          [tenant]="store.selectedTenant()"
          [loading]="store.selectedTenantLoading()"
          [error]="store.selectedTenantError()"
          (openChange)="onViewDialogOpenChange($event)"
          (editTenant)="onEditTenant($event)"
        />
      }
    </div>
  </section>
</section>
