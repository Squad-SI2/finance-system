<section class="mx-auto max-w-3xl space-y-6">
  <div class="space-y-1">
    <h1 class="text-2xl font-semibold tracking-tight">Crear tenant</h1>
    <p class="text-muted-foreground text-sm">
      Registra un nuevo tenant dentro del sistema.
    </p>
  </div>

  <app-tenant-form
    [mode]="'create'"
    [title]="'Nuevo tenant'"
    [description]="'Completa los datos para registrar un nuevo tenant.'"
    [submitLabel]="'Guardar tenant'"
    [submitting]="store.submitting()"
    [submitError]="store.createError()"
    (formSubmitted)="onCreateTenant($event)"
    (cancelClicked)="onCancel()"
  />
</section>
