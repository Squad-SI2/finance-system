<section class="mx-auto max-w-3xl space-y-6">
  <div>
    <h1 class="text-2xl font-semibold">Crear rol</h1>
    <p class="text-muted-foreground">Registra un nuevo rol en el sistema.</p>
  </div>

  <app-role-form
    [mode]="'create'"
    [submitting]="store.submitting()"
    [submitError]="store.createError()"
    (formSubmitted)="onCreateRole($event)"
    (cancelClicked)="onCancel()"
  />
</section>
