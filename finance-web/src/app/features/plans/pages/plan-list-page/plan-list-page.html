<section class="space-y-6">
  <section hlmCard>
    <app-card-header
      title="Planes"
      description="Gestiona los planes registrados en el sistema"
      icon="lucideUsers"
      [showAction]="!store.isEmpty()"
      actionLabel="Nuevo"
      actionIcon="lucidePlus"
      (actionClick)="onCreatePlan()"
    />

    <div hlmCardContent>
      @if (store.loading()) {
        <div class="space-y-4">
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
        </div>
      } @else if (store.hasError()) {
        <app-table-error
          variant="destructive"
          icon="lucideAlertCircle"
          [description]="
            store.error()?.message || 'Ocurrio un error inesperado'
          "
          title="No se pudieron cargar los planes"
          [showAction]="true"
          actionLabel="Reintentar"
          (actionClick)="onRetry()"
        />
      } @else if (store.isEmpty()) {
        <app-empty-state
          title="Sin planes"
          description="Aún no existen planes para mostrar."
          icon="lucideInbox"
          [showAction]="true"
          actionLabel="Crear primer plan"
          actionIcon="lucidePlus"
          (actionClick)="onCreatePlan()"
        />
      } @else {
        <app-plan-table
          [plans]="store.plans()"
          [togglingPlanIds]="store.togglingPlanIds()"
          (viewPlan)="onViewPlan($event)"
          (editPlan)="onEditPlan($event)"
          (activatePlan)="onActivatePlan($event)"
          (deactivatePlan)="onDeactivatePlan($event)"
        />
        <app-plan-detail-dialog
          [open]="viewDialogOpen()"
          [plan]="store.selectedPlan()"
          [loading]="store.selectedPlanLoading()"
          [error]="store.selectedPlanError()"
          (openChange)="onViewDialogOpenChange($event)"
          (editPlan)="onEditPlan($event)"
        />
      }
    </div>
  </section>
</section>
