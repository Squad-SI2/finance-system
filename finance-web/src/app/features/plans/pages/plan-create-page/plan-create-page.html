<section class="mx-auto max-w-3xl space-y-6">
  <div class="space-y-1">
    <h1 class="text-2xl font-semibold tracking-tight">Crear plan</h1>
    <p class="text-muted-foreground text-sm">
      Registra un nuevo plan dentro del sistema.
    </p>
  </div>

  <app-plan-form
    [mode]="'create'"
    [title]="'Nuevo plan'"
    [description]="'Completa los datos para registrar un nuevo plan.'"
    [submitLabel]="'Guardar plan'"
    [submitting]="store.submitting()"
    [submitError]="store.createError()"
    (formSubmitted)="onCreatePlan($event)"
    (cancelClicked)="onCancel()"
  />
</section>
