<div hlmTableContainer class="overflow-x-auto">
  <table hlmTable class="w-full text-sm text-left">
    
    <thead hlmTHead class="bg-[#fafafa] border-y border-[#cccccc]">
      <tr hlmTr>
        <th hlmTh class="px-4 py-3 text-xs font-semibold text-[#666666] uppercase tracking-wider">
          Nombre
        </th>
        <th hlmTh class="px-4 py-3 text-xs font-semibold text-[#666666] uppercase tracking-wider">
          Correo
        </th>
        <th hlmTh class="px-4 py-3 text-xs font-semibold text-[#666666] uppercase tracking-wider">
          Estado
        </th>
        <th hlmTh class="px-4 py-3 text-xs font-semibold text-[#666666] uppercase tracking-wider text-right">
          Acciones
        </th>
      </tr>
    </thead>

    <tbody hlmTBody class="divide-y divide-[#cccccc]/50 bg-[#ffffff]">
      @for (user of users(); track user.id) {
        <tr hlmTr class="transition-colors hover:bg-[#f9f9f9] group">
          
          <td hlmTd class="px-4 py-3 font-medium text-[#333333]">
            {{ user.firstName }} {{ user.lastName }}
          </td>

          <td hlmTd class="px-4 py-3 text-[#666666]">
            {{ user.email }}
          </td>

          <td hlmTd class="px-4 py-3">
            @if (user.isActive) {
              <span class="inline-flex items-center gap-1.5 rounded-md border border-[#cccccc] bg-[#f5f5f5] px-2.5 py-1 text-xs font-semibold text-[#333333] shadow-sm">
                <span class="size-1.5 rounded-full bg-[#333333] animate-pulse"></span>
                Activo
              </span>
            } @else {
              <span class="inline-flex items-center gap-1.5 rounded-md border border-transparent px-2.5 py-1 text-xs font-medium text-[#999999]">
                <span class="size-1.5 rounded-full bg-[#cccccc]"></span>
                Inactivo
              </span>
            }
          </td>

          <td hlmTd class="px-4 py-3 text-right">
            <div class="flex justify-end gap-2 opacity-90 transition-opacity group-hover:opacity-100">
              
              <button hlmBtn variant="outline" size="sm" (click)="onViewUser(user)"
                      class="h-8 px-3 text-xs font-medium text-[#666666] border border-[#cccccc] bg-[#ffffff] hover:bg-[#f5f5f5] hover:text-[#333333] transition-colors cursor-pointer shadow-sm">
                Ver
              </button>

              <button hlmBtn variant="outline" size="sm" (click)="onEditUser(user.id)"
                      class="h-8 px-3 text-xs font-medium text-[#666666] border border-[#cccccc] bg-[#ffffff] hover:bg-[#f5f5f5] hover:text-[#333333] transition-colors cursor-pointer shadow-sm">
                Editar
              </button>

              @if (user.isActive) {
                <button hlmBtn variant="outline" size="sm" [disabled]="isUserToggling(user.id)" (click)="onDeactivateUser(user)"
                        class="h-8 min-w-[90px] px-3 text-xs font-medium text-[#333333] border border-[#cccccc] bg-[#f5f5f5] hover:bg-[#e8e8e8] transition-colors cursor-pointer shadow-sm disabled:opacity-50">
                  @if (isUserToggling(user.id)) {
                    Procesando...
                  } @else {
                    Desactivar
                  }
                </button>
              } @else {
                <button hlmBtn size="sm" [disabled]="isUserToggling(user.id)" (click)="onActivateUser(user)"
                        class="h-8 min-w-[90px] px-3 text-xs font-medium text-[#ffffff] bg-[#333333] hover:bg-[#666666] transition-all cursor-pointer shadow-sm disabled:opacity-50 disabled:bg-[#999999]">
                  @if (isUserToggling(user.id)) {
                    Procesando...
                  } @else {
                    Activar
                  }
                </button>
              }
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
