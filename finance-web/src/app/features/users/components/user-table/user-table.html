<div hlmTableContainer class="overflow-x-auto">
  <table hlmTable class="w-full text-sm text-left">
    
    <thead hlmTHead class="bg-[#F1F8E9] border-y border-[#C8E6C9]">
      <tr hlmTr>
        <th hlmTh class="px-4 py-3 text-xs font-semibold text-[#2E7D32] uppercase tracking-wider">
          Nombre
        </th>
        <th hlmTh class="px-4 py-3 text-xs font-semibold text-[#2E7D32] uppercase tracking-wider">
          Correo
        </th>
        <th hlmTh class="px-4 py-3 text-xs font-semibold text-[#2E7D32] uppercase tracking-wider">
          Estado
        </th>
        <th hlmTh class="px-4 py-3 text-xs font-semibold text-[#2E7D32] uppercase tracking-wider text-right">
          Acciones
        </th>
      </tr>
    </thead>

    <tbody hlmTBody class="divide-y divide-[#C8E6C9]/50 bg-white">
      @for (user of users(); track user.id) {
        <tr hlmTr class="transition-colors hover:bg-[#E8F5E9] group">
          
          <td hlmTd class="px-4 py-3 font-medium text-[#2E7D32]">
            {{ user.firstName }} {{ user.lastName }}
          </td>

          <td hlmTd class="px-4 py-3 text-[#666666]">
            {{ user.email }}
          </td>

          <td hlmTd class="px-4 py-3">
            @if (user.isActive) {
              <span class="inline-flex items-center gap-1.5 rounded-md border border-[#C8E6C9] bg-[#E8F5E9] px-2.5 py-1 text-xs font-semibold text-[#2E7D32] shadow-sm">
                <span class="size-1.5 rounded-full bg-[#4CAF50] animate-pulse"></span>
                Activo
              </span>
            } @else {
              <span class="inline-flex items-center gap-1.5 rounded-md border border-transparent px-2.5 py-1 text-xs font-medium text-[#999999]">
                <span class="size-1.5 rounded-full bg-[#C8E6C9]"></span>
                Inactivo
              </span>
            }
          </td>

          <td hlmTd class="px-4 py-3 text-right">
            <div class="flex justify-end gap-2 opacity-90 transition-opacity group-hover:opacity-100">
              
              <button hlmBtn variant="outline" size="sm" (click)="onViewUser(user)"
                      class="h-8 px-3 text-xs font-medium text-[#4CAF50] border border-[#C8E6C9] bg-white hover:bg-[#E8F5E9] hover:text-[#2E7D32] transition-colors cursor-pointer shadow-sm">
                Ver
              </button>

              <button hlmBtn variant="outline" size="sm" (click)="onEditUser(user.id)"
                      class="h-8 px-3 text-xs font-medium text-[#4CAF50] border border-[#C8E6C9] bg-white hover:bg-[#E8F5E9] hover:text-[#2E7D32] transition-colors cursor-pointer shadow-sm">
                Editar
              </button>

              @if (user.isActive) {
                <button hlmBtn variant="outline" size="sm" [disabled]="isUserToggling(user.id)" (click)="onDeactivateUser(user)"
                        class="h-8 min-w-[90px] px-3 text-xs font-medium text-[#666666] border border-[#C8E6C9] bg-white hover:bg-[#E8F5E9] hover:text-[#2E7D32] transition-colors cursor-pointer shadow-sm disabled:opacity-50">
                  @if (isUserToggling(user.id)) {
                    Procesando...
                  } @else {
                    Desactivar
                  }
                </button>
              } @else {
                <button hlmBtn size="sm" [disabled]="isUserToggling(user.id)" (click)="onActivateUser(user)"
                        class="h-8 min-w-[90px] px-3 text-xs font-medium text-white bg-[#2E7D32] hover:bg-[#4CAF50] transition-all cursor-pointer shadow-sm disabled:opacity-50 disabled:bg-[#C8E6C9]">
                  @if (isUserToggling(user.id)) {
                    Procesando...
                  } @else {
                    Activar
                  }
                </button>
              }
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
