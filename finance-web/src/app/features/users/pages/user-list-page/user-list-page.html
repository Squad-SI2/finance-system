<section class="space-y-6">
  <section hlmCard>
    <app-card-header
      title="Usuarios"
      description="Gestiona los usuarios registrados en el sistema"
      icon="lucideUsers"
      [showAction]="!store.isEmpty()"
      actionLabel="Nuevo"
      actionIcon="lucidePlus"
      (actionClick)="onCreateUser()"
    />

    <div hlmCardContent>
      @if (store.loading()) {
        <div class="space-y-4">
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
        </div>
      } @else if (store.hasError()) {
        <app-table-error
          variant="destructive"
          icon="lucideAlertCircle"
          [description]="
            store.error()?.message || 'Ocurrio un error inesperado'
          "
          title="No se pudieron cargar los usuarios"
          [showAction]="true"
          actionLabel="Reintentar"
          (actionClick)="onRetry()"
        />
      } @else if (store.isEmpty()) {
        <app-empty-state
          title="Sin usuarios"
          description="Aun no existen usuarios para mostrar."
          icon="lucideInbox"
          [showAction]="true"
          actionLabel="Crear primer usuario"
          actionIcon="lucidePlus"
          (actionClick)="onCreateUser()"
        />
      } @else {
        <app-user-table
          [users]="store.users()"
          [togglingUserIds]="store.togglingUserIds()"
          (viewUser)="onViewUser($event)"
          (editUser)="onEditUser($event)"
          (activateUser)="onActivateUser($event)"
          (deactivateUser)="onDeactivateUser($event)"
        />
        <app-user-detail-dialog
          [open]="viewDialogOpen()"
          [user]="store.selectedUser()"
          [loading]="store.selectedUserLoading()"
          [error]="store.selectedUserError()"
          (openChange)="onViewDialogOpenChange($event)"
          (editUser)="onEditUser($event)"
        />
      }
    </div>
  </section>
</section>
