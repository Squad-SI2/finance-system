<div class="layout-wrapper min-h-screen bg-[#F1F8E9]">
  <!-- Sidebar -->
  <app-sidebar
    [isOpen]="sidebarOpen()"
    (closeSidebar)="toggleSidebar()" />

  <!-- Main Content Area -->
  <div class="layout-main transition-all duration-300 ease-in-out"
       [class.ml-[260px]]="sidebarOpen()"
       [class.ml-[80px]]="!sidebarOpen()">
    
    <!-- Header -->
    <app-header
      [sidebarOpen]="sidebarOpen()"
      (toggleSidebar)="toggleSidebar()" />

    <!-- Page Content -->
    <main class="layout-content p-6 sm:p-8 overflow-y-auto" role="main">
      <router-outlet />
    </main>
  </div>
</div>
