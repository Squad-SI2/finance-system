<!-- Header -->
<header class="header-bar bg-white h-16 px-4 sm:px-6 flex items-center justify-between border-b border-[#C8E6C9] shadow-sm sticky top-0 z-10" role="banner">
  <div class="flex items-center gap-3">
    <!-- Toggle Sidebar (all screens) -->
    <button
      (click)="onToggleSidebar()"
      class="header-btn w-8 h-8 flex items-center justify-center rounded-lg hover:bg-[#F1F8E9] transition-colors"
      type="button"
      aria-label="Abrir o cerrar menú lateral"
      title="Toggle menú">
      <i class="bx text-xl text-[#666666]" [class]="sidebarOpen() ? 'bx-menu-alt-left' : 'bx-menu'"></i>
    </button>

    <!-- Breadcrumb / Page Title -->
    <div class="hidden sm:flex items-center gap-2 text-sm">
      <span class="text-[#4CAF50]">Tenant</span>
      <i class="bx bx-chevron-right text-[#C8E6C9] text-xs"></i>
      <span class="font-medium text-[#2E7D32]">Dashboard</span>
    </div>
  </div>

  <!-- Right Actions -->
  <div class="flex items-center gap-2">
    <!-- Notifications -->
    <button
      class="header-btn w-8 h-8 flex items-center justify-center rounded-lg hover:bg-[#F1F8E9] transition-colors relative"
      type="button"
      aria-label="Notificaciones"
      title="Notificaciones">
      <i class="bx bx-bell text-xl text-[#666666]"></i>
      <span class="notification-dot absolute top-1 right-1 w-2 h-2 bg-[#2E7D32] rounded-full"></span>
    </button>

    <!-- Divider -->
    <div class="hidden sm:block w-px h-6 bg-[#C8E6C9] mx-1"></div>

    <!-- Profile Menu -->
    <div class="relative">
      <button
        (click)="toggleProfileMenu()"
        class="profile-trigger flex items-center gap-2 px-2 py-1 rounded-lg hover:bg-[#F1F8E9] transition-colors"
        type="button"
        aria-haspopup="true"
        [attr.aria-expanded]="profileMenuOpen()"
        title="Menú de perfil">
        <div class="profile-avatar w-8 h-8 rounded-full bg-[#2E7D32] flex items-center justify-center">
          <span class="text-[11px] font-bold text-white">{{ userInitials }}</span>
        </div>
        <div class="hidden sm:block text-left">
          <p class="text-[13px] font-semibold text-[#2E7D32] leading-tight">{{ userName }}</p>
          <p class="text-[11px] text-[#4CAF50] leading-tight">Tenant</p>
        </div>
        <i class="bx bx-chevron-down text-[#4CAF50] text-lg transition-transform duration-200"
           [class.rotate-180]="profileMenuOpen()"></i>
      </button>

      <!-- Dropdown -->
      @if (profileMenuOpen()) {
        <div class="dropdown-menu absolute right-0 mt-2 w-56 bg-white rounded-xl border border-[#C8E6C9] shadow-lg z-50 overflow-hidden" role="menu" aria-label="Opciones de perfil">
          <!-- User Info -->
          <div class="px-4 py-3 border-b border-[#C8E6C9] bg-[#F1F8E9]">
            <p class="text-[13px] font-semibold text-[#2E7D32]">{{ userName }}</p>
            <p class="text-[11px] text-[#666666] mt-0.5">{{ userEmail }}</p>
          </div>

          <!-- Menu Items -->
          <div class="py-1">
            <a href="#"
               (click)="closeProfileMenu(); $event.preventDefault()"
               class="dropdown-item flex items-center gap-3 px-4 py-2.5 text-sm text-[#333333] hover:bg-[#F1F8E9] transition-colors"
               role="menuitem">
              <i class="bx bx-user text-base text-[#4CAF50]"></i>
              <span>Mi perfil</span>
            </a>
            <a href="#"
               (click)="closeProfileMenu(); $event.preventDefault()"
               class="dropdown-item flex items-center gap-3 px-4 py-2.5 text-sm text-[#333333] hover:bg-[#F1F8E9] transition-colors"
               role="menuitem">
              <i class="bx bx-cog text-base text-[#4CAF50]"></i>
              <span>Configuración</span>
            </a>
          </div>

          <!-- Logout -->
          <div class="border-t border-[#C8E6C9] py-1">
            <button
              (click)="onLogout()"
              class="dropdown-item dropdown-item-danger flex items-center gap-3 px-4 py-2.5 w-full text-sm text-left text-[#C62828] hover:bg-[#FFEBEE] transition-colors"
              role="menuitem"
              type="button">
              <i class="bx bx-log-out text-base"></i>
              <span>Cerrar sesión</span>
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</header>
