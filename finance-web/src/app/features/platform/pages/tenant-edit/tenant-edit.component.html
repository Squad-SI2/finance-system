<div class="px-4 sm:px-6 lg:px-8 max-w-3xl mx-auto">
  <div class="mb-8">
    <h1 class="text-xl font-bold text-[#333333]">Editar Empresa</h1>
    <p class="mt-2 text-sm text-[#666666]">
      Modifica los datos de la cuenta empresarial suscrita a tu plataforma SaaS.
    </p>
  </div>

  <div class="bg-[#ffffff] shadow-sm ring-1 ring-[#cccccc] sm:rounded-lg">
    
    @if (isLoading()) {
      <div class="p-8 text-center text-sm text-[#666666]">Cargando información del tenant...</div>
    } @else {
      <form [formGroup]="tenantForm" (ngSubmit)="onSubmit()" class="px-4 py-5 sm:p-6">
        
        @if (error()) {
          <div class="mb-6 rounded-md bg-[#f5f5f5] p-4 text-sm text-[#333333] border border-[#999999]">
            {{ error() }}
          </div>
        }

        <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
          <div class="sm:col-span-4">
            <label for="name" class="block text-sm font-medium text-[#333333]">
              Nombre de la Empresa
            </label>
            <div class="mt-1">
              <input
                type="text"
                id="name"
                formControlName="name"
                [class]="hasFieldError('name') ? 'border-[#666666]' : 'border-[#cccccc]'"
                class="block w-full rounded-md shadow-sm sm:text-sm px-3 py-2 border focus:outline-none focus:ring-[#333333] focus:border-[#333333]" />
            </div>
          </div>

          <div class="sm:col-span-4">
            <label for="slug" class="block text-sm font-medium text-[#666666]">
              URL Personalizada (Slug)  - Inmutable
            </label>
            <div class="mt-1">
              <input
                type="text"
                id="slug"
                formControlName="slug"
                class="block w-full rounded-md shadow-sm sm:text-sm px-3 py-2 border border-[#cccccc] bg-[#f5f5f5] text-[#666666] cursor-not-allowed" />
            </div>
          </div>

          <div class="sm:col-span-4">
            <label for="planCode" class="block text-sm font-medium text-[#333333]">
              Plan (ID / Code)
            </label>
            <div class="mt-1">
              <input
                type="text"
                id="planCode"
                formControlName="planCode"
                class="block w-full rounded-md shadow-sm sm:text-sm px-3 py-2 border border-[#cccccc] focus:outline-none focus:ring-[#333333] focus:border-[#333333]" />
            </div>
            <p class="mt-2 text-xs text-[#999999]">Asigna o cambia el código de plan del tenant.</p>
          </div>
        </div>

        <div class="mt-8 flex justify-end gap-3 pt-5 border-t border-[#cccccc]">
          <button
            type="button"
            routerLink="/platform/tenants"
            class="rounded-md border border-[#cccccc] bg-[#ffffff] py-2 px-4 text-sm font-medium text-[#333333] shadow-sm hover:bg-[#f5f5f5] transition">
            Volver
          </button>
          <button
            type="submit"
            [disabled]="isSubmitting() || tenantForm.invalid"
            class="inline-flex justify-center rounded-md border border-transparent bg-[#333333] py-2 px-4 text-sm font-medium text-[#ffffff] shadow-sm hover:bg-[#666666] transition disabled:bg-[#cccccc]">
            Guardar Cambios
          </button>
        </div>
      </form>
    }
  </div>
</div>
