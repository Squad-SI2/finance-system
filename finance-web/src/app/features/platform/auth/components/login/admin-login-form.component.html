<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5 w-full">
  
  @if (errorMessage()) {
    <div class="p-4 flex items-center gap-3 text-sm text-[#333333] rounded-lg bg-[#cccccc]/30 border border-[#999999]">
      <svg class="w-5 h-5 text-[#666666]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      {{ errorMessage() }}
    </div>
  }

  <div>
    <label class="block text-sm font-medium text-[#666666] mb-1">Correo Electrónico</label>
    <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-[#999999]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
        </svg>
      </div>
      <input type="email" formControlName="email" 
             class="block w-full pl-10 rounded-lg border-[#cccccc] bg-[#ffffff] shadow-sm focus:border-[#333333] focus:ring-[#333333] sm:text-sm p-3 border text-[#333333] placeholder-[#999999] transition-colors duration-200"
             placeholder="admin@tu-saas.com">
    </div>
    @if (loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')) {
      <p class="text-[#666666] text-xs mt-1 font-medium">El correo es requerido.</p>
    }
  </div>

  <div>
    <label class="block text-sm font-medium text-[#666666] mb-1">Contraseña</label>
    <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-[#999999]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <input type="password" formControlName="password" 
             class="block w-full pl-10 rounded-lg border-[#cccccc] bg-[#ffffff] shadow-sm focus:border-[#333333] focus:ring-[#333333] sm:text-sm p-3 border text-[#333333] placeholder-[#999999] transition-colors duration-200"
             placeholder="••••••••">
    </div>
  </div>

  <div class="flex items-center justify-between mt-2">
    <div class="flex items-center">
      <input type="checkbox" class="h-4 w-4 text-[#333333] focus:ring-[#333333] border-[#cccccc] rounded">
      <label class="ml-2 block text-sm text-[#666666]">Recordar sesión</label>
    </div>
    <div class="text-sm">
      <a href="#" class="font-medium text-[#666666] hover:text-[#333333] transition-colors">¿Olvidaste tu clave?</a>
    </div>
  </div>

  <button type="submit" [disabled]="isLoading()"
          class="w-full flex justify-center py-3 px-4 mt-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-[#ffffff] bg-[#333333] hover:bg-[#666666] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#333333] disabled:bg-[#999999] disabled:cursor-not-allowed transition-all duration-200">
    @if (isLoading()) {
      <div class="flex items-center gap-2">
        <svg class="animate-spin h-5 w-5 text-[#ffffff]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Iniciando sesión...</span>
      </div>
    } @else {
      <span>Ingresar a la Plataforma</span>
    }
  </button>
  <div class="flex items-center gap-2.5 my-5">
        <div class="flex-1 h-px bg-[#EBEBEA]"></div>
        <span class="text-[11px] text-[#C5C5C0] whitespace-nowrap tracking-[0.04em]">o continúa con</span>
        <div class="flex-1 h-px bg-[#EBEBEA]"></div>
      </div>

      <button type="button"
              class="flex items-center justify-center gap-2 w-full py-2.5 px-3.5
                     border border-[#DDDDD9] bg-[#FAFAF8] text-[12.5px] text-[#444]
                     hover:bg-[#F0F0EE] hover:border-[#C5C5C0] transition-colors duration-100 cursor-pointer">
        <img src="/logos/google.svg" alt="Continuar con Google" class="w-5 h-5">
        Continuar con Google
      </button>

      <p class="mt-5 text-[12px] text-[#999]">
        ¿No tienes cuenta? <a href="#" class="text-[#0066CC] hover:underline">Registrarse ahora</a>
      </p>
</form>
