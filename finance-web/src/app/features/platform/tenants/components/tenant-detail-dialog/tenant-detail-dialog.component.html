<dialog #dialogEl class="w-full max-w-lg rounded-lg shadow-2xl p-0 backdrop:bg-black/50" (close)="onClose()">
  @if (tenant(); as t) {
    <article class="bg-white rounded-lg">
      
      <header class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-bold text-gray-900">Detalle de Organización</h2>
        <button type="button" (click)="onClose()" 
                class="p-1.5 text-gray-400 hover:text-gray-600 rounded-md hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </header>

      <section class="px-6 py-5">
        <dl class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
          
          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</dt>
            <dd class="mt-1 text-sm font-semibold text-gray-900">{{ t.name }}</dd>
          </div>

          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Slug</dt>
            <dd class="mt-1">
              <span class="inline-flex px-2 py-0.5 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">
                {{ t.slug }}
              </span>
            </dd>
          </div>

          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Schema DB</dt>
            <dd class="mt-1 text-sm text-gray-700 font-mono">{{ t.schemaName }}</dd>
          </div>

          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</dt>
            <dd class="mt-1">
              <span [class]="t.active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'" 
                    class="inline-flex px-2 py-0.5 text-xs font-semibold rounded-full">
                {{ t.status }}
              </span>
            </dd>
          </div>

          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Plan</dt>
            <dd class="mt-1 text-sm text-gray-700">{{ t.planId ?? 'Sin plan asignado' }}</dd>
          </div>

          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">ID</dt>
            <dd class="mt-1 text-sm text-gray-500 font-mono break-all">{{ t.id }}</dd>
          </div>

          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Creado</dt>
            <dd class="mt-1 text-sm text-gray-700">{{ t.createdAt | date:'medium' }}</dd>
          </div>

          <div>
            <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Actualizado</dt>
            <dd class="mt-1 text-sm text-gray-700">{{ t.updatedAt | date:'medium' }}</dd>
          </div>

        </dl>
      </section>

      <footer class="flex justify-end px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-lg">
        <button type="button" (click)="onClose()" 
                class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors shadow-sm">
          Cerrar
        </button>
      </footer>

    </article>
  }
</dialog>
