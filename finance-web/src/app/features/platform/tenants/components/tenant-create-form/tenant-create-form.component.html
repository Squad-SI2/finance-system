<form [formGroup]="tenantForm" (ngSubmit)="onSubmit()" class="space-y-6">
  
  <div>
    <label class="block text-sm font-medium text-gray-700">Nombre de la Empresa</label>
    <input type="text" formControlName="name" 
           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border"
           placeholder="Ej: Finanzas Corp S.A.">
    @if (tenantForm.get('name')?.touched && tenantForm.get('name')?.hasError('required')) {
      <p class="text-red-500 text-xs mt-1">El nombre es obligatorio.</p>
    }
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">Slug (Identificador para la URL / Cabecera)</label>
    <div class="mt-1 flex rounded-md shadow-sm">
      <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 sm:text-sm">
        app.tusaas.com/
      </span>
      <input type="text" formControlName="slug" 
             class="flex-1 block w-full rounded-none rounded-r-md border-gray-300 focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border"
             placeholder="finanzas-corp">
    </div>
    @if (tenantForm.get('slug')?.touched && tenantForm.get('slug')?.hasError('pattern')) {
      <p class="text-red-500 text-xs mt-1">El slug solo puede contener letras minúsculas, números y guiones.</p>
    }
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">Plan de Suscripción</label>
    <select formControlName="planCode" 
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
      <option value="BASIC">Plan Básico</option>
      <option value="PRO">Plan Profesional</option>
      <option value="ENTERPRISE">Plan Empresarial</option>
    </select>
  </div>

  <div class="flex justify-end pt-4 border-t border-gray-200">
    <button type="submit" [disabled]="isLoading() || tenantForm.invalid"
            class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-blue-400">
      @if (isLoading()) {
        <span>Registrando...</span>
      } @else {
        <span>Registrar Empresa</span>
      }
    </button>
  </div>
</form>
