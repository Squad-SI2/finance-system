<form [formGroup]="form" (ngSubmit)="submit()" class="user-form">
  <div>
    <label for="tenantSlug">Tenant</label>
    <input
      id="tenantSlug"
      type="text"
      formControlName="tenantSlug"
      placeholder="example: barber-shop-la-paz"
    />
  </div>

  <div>
    <label for="firstName">First name</label>
    <input id="firstName" type="text" formControlName="firstName" />
  </div>

  <div>
    <label for="lastName">Last name</label>
    <input id="lastName" type="text" formControlName="lastName" />
  </div>

  <div>
    <label for="email">Email</label>
    <input id="email" type="email" formControlName="email" />
  </div>

  <div>
    <label for="roleId">Role</label>
    <select id="roleId" formControlName="roleId">
      <option value="">Select a role</option>
      <option value="rol_admin">Administrator</option>
      <option value="rol_barber">Barber</option>
      <option value="rol_client">Client</option>
    </select>
  </div>

  <button type="submit">Create user</button>
</form>
