<section class="space-y-6">
  <section hlmCard>
    <app-card-header
      title="Permisos"
      description="Consulta el catálogo de permisos del sistema"
      icon="lucideShieldCheck"
      [showAction]="false"
    />

    <div hlmCardContent>
      @if (store.loading()) {
        <div class="space-y-4">
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
          <hlm-skeleton class="h-10 w-full rounded-md" />
        </div>
      } @else if (store.hasError()) {
        <app-table-error
          variant="destructive"
          icon="lucideAlertCircle"
          [description]="
            store.error()?.message || 'Ocurrió un error inesperado'
          "
          title="No se pudieron cargar los permisos"
          [showAction]="true"
          actionLabel="Reintentar"
          (actionClick)="onRetry()"
        />
      } @else if (store.isEmpty()) {
        <app-empty-state
          title="Sin permisos"
          description="No existen permisos para mostrar."
          icon="lucideInbox"
          [showAction]="false"
        />
      } @else {
        <app-permission-table [permissions]="store.permissions()" />
      }
    </div>
  </section>
</section>
