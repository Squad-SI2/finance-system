<section hlmCard>
  <div hlmCardContent class="space-y-3 p-5">
    <p class="text-muted-foreground text-sm">
      {{ metric().label }}
    </p>

    @if (metric().loading) {
      <div class="space-y-2">
        <div class="bg-muted h-8 w-20 animate-pulse rounded"></div>
        <div class="bg-muted h-4 w-24 animate-pulse rounded"></div>
      </div>
    } @else {
      <p class="text-3xl font-semibold" [class]="metricToneClass()">
        {{ metric().value }}
      </p>

      <!-- <p class="text-muted-foreground text-sm">
        {{ metric().helper }}
      </p> -->

      @if (metric().error) {
        <p class="text-sm text-amber-600">
          {{ metric().error }}
        </p>
      } @else {
        <p class="text-muted-foreground text-sm">
          {{ metric().helper }}
        </p>
      }
    }
  </div>
</section>
