services:
  serv-finance-db:
    image: postgres:16

    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/data
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: finance_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - finance-net


  serv-finance-api:

    build:
      context: ./finance-api
      dockerfile: Dockerfile.dev

    restart: unless-stopped
    depends_on:
      serv-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BACKEND_PORT: ${BACKEND_PORT}
      DB_HOST: serv-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      TENANT_HEADER_NAME: ${TENANT_HEADER_NAME}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      PASSWORD_RESET_EXPIRATION_MINUTES: ${PASSWORD_RESET_EXPIRATION_MINUTES}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE}
      PLATFORM_SUPERADMIN_EMAIL: ${PLATFORM_SUPERADMIN_EMAIL}
      PLATFORM_SUPERADMIN_PASSWORD: ${PLATFORM_SUPERADMIN_PASSWORD}
      PLATFORM_SUPERADMIN_FIRST_NAME: ${PLATFORM_SUPERADMIN_FIRST_NAME}
      PLATFORM_SUPERADMIN_LAST_NAME: ${PLATFORM_SUPERADMIN_LAST_NAME}

    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./finance-api:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: sh -c "sed -i 's/\r$//' ./mvnw && chmod +x ./mvnw && ./mvnw clean spring-boot:run"

    depends_on:
      serv-finance-db:
        condition: service_healthy

    networks:
      - finance-net

  serv-finance-web:
    build:
      context: ./finance-web
      dockerfile: Dockerfile.dev

    restart: unless-stopped
    depends_on:
      - serv-finance-api
    environment:
      # enables file watching via polling (for live reload)
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT}:4200"
    volumes:
      - ./finance-web:/app
      - node_modules:/app/node_modules
    working_dir: /app
    networks:
      - finance-net

volumes:
  finance_db_data:
  maven_cache:
  node_modules:

networks:
  finance-net:
    # custom network name (avoid auto-generated compose name)
    name: finance-system_finance-net
    driver: bridge

