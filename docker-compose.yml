services:
  serv-finance-db:
    image: postgres:16

    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/data
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  serv-finance-api:
    build:
      context: ./finance-api
      dockerfile: Dockerfile.dev

    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./finance-api:/app
      - maven_cache:/root/.m2
    depends_on:
      serv-finance-db:
        condition: service_healthy
    networks:
      - finance-net

  serv-finance-web:
    build:
      context: ./finance-web
      dockerfile: Dockerfile.dev

    restart: unless-stopped
    depends_on:
      - serv-finance-api
    environment:
      # enables file watching via polling (for live reload)
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT}:4200"
    volumes:
      - ./finance-web:/app
      - node_modules:/app/node_modules
    working_dir: /app
    networks:
      - finance-net

volumes:
  finance_db_data:
  maven_cache:
  node_modules:

networks:
  finance-net:
    # custom network name (avoid auto-generated compose name)
    name: finance-system_finance-net
    driver: bridge
