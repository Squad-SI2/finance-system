services:
  serv-finance-db:
    image: postgres:16

    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/data
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: finance_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - finance-net

  serv-finance-api:
    build:
      context: ./finance-api
      dockerfile: Dockerfile.dev

    restart: unless-stopped
    depends_on:
      serv-finance-db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./finance-api:/app
      - maven_cache:/root/.m2
      - ./backups:/storage/backups
    working_dir: /app
    networks:
      - finance-net

  reports-ai:
    build:
      context: ./reports-ai
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      INTERNAL_TOKEN: ${REPORTS_AI_INTERNAL_TOKEN:-}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      STT_PROVIDER: ${STT_PROVIDER:-mock}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-whisper-large-v3}
    networks:
      - finance-net

  serv-finance-web:
    build:
      context: ./finance-web-2 #./finance-web
      dockerfile: Dockerfile.dev

    restart: unless-stopped
    depends_on:
      - serv-finance-api
    environment:
      # enables file watching via polling (for live reload)
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT}:4200"
    volumes:
      # - ./finance-web:/app
      - ./finance-web-2:/app
      - node_modules:/app/node_modules
    working_dir: /app
    networks:
      - finance-net

volumes:
  finance_db_data:
  maven_cache:
  node_modules:

networks:
  finance-net:
    # custom network name (avoid auto-generated compose name)
    name: finance-system_finance-net
    driver: bridge
