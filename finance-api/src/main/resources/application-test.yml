spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finance_db}
    username: ${DB_USER:finance_user}
    password: ${DB_PASSWORD:finance_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 1025