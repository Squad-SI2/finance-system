
spring:
  application:
    name: finance-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${BACKEND_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  tenancy:
    header-name: ${TENANT_HEADER_NAME:X-Tenant-Slug}
    public-schema: ${PUBLIC_SCHEMA:public}
    tenant-schema-prefix: tenant_
    public-paths:
      - /swagger-ui.html
      - /swagger-ui/**
      - /api-docs
      - /api-docs/**
      - /actuator/health
      - /actuator/info
      - /api/public/**
    global-paths:
      - /api/platform/**
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  bootstrap:
    superadmin:
      email: ${PLATFORM_SUPERADMIN_EMAIL:superadmin@finance.local}
      password: ${PLATFORM_SUPERADMIN_PASSWORD:SuperAdmin123!}
      first-name: ${PLATFORM_SUPERADMIN_FIRST_NAME:Platform}
      last-name: ${PLATFORM_SUPERADMIN_LAST_NAME:Admin}
  mail:
    from: ${MAIL_FROM:no-reply@finance.local}
  notifications:
    password-reset:
      expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:30}
      reset-url-base: ${PASSWORD_RESET_URL_BASE:http://localhost:4200/reset-password}

server:
  # Application port (defaults to 8080 if BACKEND_PORT is not set)
  port: ${BACKEND_PORT:8080}

spring:
  application:
    # Application name (useful for logs and service identification)
    name: finance-api

  datasource:
    # PostgreSQL connection using environment variables (Docker-friendly)
    # Uses service name instead of localhost inside Docker network
    url: jdbc:postgresql://${POSTGRES_SERV}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Do not auto-create or modify schema (handled by Flyway)
      ddl-auto: none
    # Enable SQL logging for debugging (disable in production)
    show-sql: true
    properties:
      hibernate:
        # Explicit PostgreSQL dialect for Hibernate
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    # Enables Flyway database migrations on application startup
    enabled: true
    # Allows Flyway to baseline an existing database
    baseline-on-migrate: true
    # Location of migration scripts inside the project
    locations: classpath:db/migration/shared

springdoc:
  api-docs:
    # OpenAPI JSON endpoint
    path: /v3/api-docs
  swagger-ui:
    # Swagger UI endpoint
    path: /swagger-ui
    # Keeps authorization tokens between page reloads
    persist-authorization: true

