spring:
  application:
    name: finance-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${BACKEND_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  tenancy:
    header-name: ${TENANT_HEADER_NAME:X-Tenant-Slug}
    public-schema: ${PUBLIC_SCHEMA:public}
    tenant-schema-prefix: tenant_
    public-paths:
      - /swagger-ui.html
      - /swagger-ui/**
      - /api-docs
      - /api-docs/**
      - /actuator/health
      - /actuator/info
      - /api/public/**
    global-paths:
      - /api/platform/**
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}