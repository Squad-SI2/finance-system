spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:55432}/${DB_NAME:finance_db}
    username: ${DB_USER:finance_user}
    password: ${DB_PASSWORD:finance_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/public
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:mailpit}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

app:
  backups:
    local-path: ${BACKUP_LOCAL_PATH:/storage/backups}
    pg-dump-path: ${PG_DUMP_PATH:pg_dump}
    pg-restore-path: ${PG_RESTORE_PATH:pg_restore}
    psql-path: ${PSQL_PATH:psql}
    host: ${DB_HOST:127.0.0.1}
    port: ${DB_PORT:55432}
    database: ${DB_NAME:finance_db}
    username: ${DB_USER:finance_user}
    password: ${DB_PASSWORD:finance_password}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    com.financesystem.finance_api: INFO
