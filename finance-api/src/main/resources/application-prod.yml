spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration/public
    baseline-on-migrate: true
    placeholders:
      tenant_readonly_password: ${TENANT_READONLY_DB_PASSWORD}
      platform_readonly_password: ${PLATFORM_READONLY_DB_PASSWORD}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  backups:
    local-path: ${BACKUP_LOCAL_PATH:/storage/backups}
    pg-dump-path: ${PG_DUMP_PATH:pg_dump}
    pg-restore-path: ${PG_RESTORE_PATH:pg_restore}
    psql-path: ${PSQL_PATH:psql}
    host: ${DB_HOST}
    port: ${DB_PORT}
    database: ${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
